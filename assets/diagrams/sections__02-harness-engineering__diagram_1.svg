  <rect x="30" y="188" width="250.62999999999997" height="18" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="36" y="197" font-size="11" font-weight="600" fill="var(--_text-sec)" dy="3.8499999999999996">alt [tmux-hook 활성화 (allowed_modes 매칭)]</text>
</g>
