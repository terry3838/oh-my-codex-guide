  <text x="159.52849999999998" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)"><tspan x="159.52849999999998" dy="-3.3000000000000007">turn-complete 이벤트</tspan><tspan x="159.52849999999998" dy="14.3">(JSON payload)</tspan></text>
