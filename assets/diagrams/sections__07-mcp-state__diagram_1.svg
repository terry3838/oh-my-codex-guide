<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 516.298 376" width="516.298" height="376" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="Agent" x1="96.9925" y1="70" x2="96.9925" y2="346" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="MCP" x1="251.341" y1="70" x2="251.341" y2="346" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="FS" x1="409.024" y1="70" x2="409.024" y2="346" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="Agent" data-to="MCP" data-label="tool call (state_write / memory_read / etc.)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="96.9925" y1="90" x2="251.341" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="174.16675" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">tool call (state_write / memory_read / etc.)</text>
</g>
<g class="message" data-from="MCP" data-to="FS" data-label="파일 읽기/쓰기 (.omx/state/, .omx/notepad.md 등)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="251.341" y1="130" x2="409.024" y2="130" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="330.1825" y="120" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">파일 읽기/쓰기 (.omx/state/, .omx/notepad.md 등)</text>
</g>
<g class="message" data-from="FS" data-to="MCP" data-label="파일 내용 반환" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="409.024" y1="170" x2="251.341" y2="170" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="330.1825" y="160" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">파일 내용 반환</text>
</g>
<g class="message" data-from="MCP" data-to="Agent" data-label="tool response" data-line-style="dashed" data-arrow-head="filled" data-self="false">
  <line x1="251.341" y1="210" x2="96.9925" y2="210" stroke="var(--_line)" stroke-width="1" stroke-dasharray="6 4" marker-end="url(#seq-arrow)" />
  <text x="174.16675" y="200" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">tool response</text>
</g>
<g class="note" data-position="over" data-actors="FS">
  <polygon points="331.75,218 480.298,218 486.298,224 486.298,241 331.75,241" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="480.298,218 486.298,224 480.298,224" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="409.024" y="229.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">.omx/state/{mode}-state.json</text>
</g>
<g class="note" data-position="over" data-actors="FS">
  <polygon points="336.20500000000004,245 475.843,245 481.843,251 481.843,268 336.20500000000004,268" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="475.843,245 481.843,251 475.843,251" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="409.024" y="256.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">.omx/project-memory.json</text>
</g>
<g class="note" data-position="over" data-actors="FS">
  <polygon points="357.292,272 454.756,272 460.756,278 460.756,295 357.292,295" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="454.756,272 460.756,278 454.756,278" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="409.024" y="283.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">.omx/notepad.md</text>
</g>
<g class="note" data-position="over" data-actors="FS">
  <polygon points="343.036,299 469.012,299 475.012,305 475.012,322 343.036,322" fill="var(--bg)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <polygon points="469.012,299 475.012,305 469.012,305" fill="var(--_inner-stroke)" stroke="var(--_node-stroke)" stroke-width="0.75" />
  <text x="409.024" y="310.5" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">.omx/logs/turns-*.jsonl</text>
</g>
<g class="actor" data-id="Agent" data-label="Codex 에이전트" data-type="participant">
  <rect x="30" y="30" width="133.985" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="96.9925" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Codex 에이전트</text>
</g>
<g class="actor" data-id="MCP" data-label="MCP 서버" data-type="participant">
  <rect x="203.985" y="30" width="94.71199999999999" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="251.341" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">MCP 서버</text>
</g>
<g class="actor" data-id="FS" data-label=".omx/ 파일시스템" data-type="participant">
  <rect x="338.697" y="30" width="140.654" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="409.024" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">.omx/ 파일시스템</text>
</g>
</svg>