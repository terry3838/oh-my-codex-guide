  <text x="214.801" y="316.75000000000006" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="214.801" dy="-12.350000000000001">fast-lane</tspan><tspan x="214.801" dy="16.900000000000002">경량 트리아지/검색</tspan><tspan x="214.801" dy="16.900000000000002">explore, writer</tspan></text>
</g>
