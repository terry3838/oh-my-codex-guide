  <rect x="374.02" y="65.35000000000001" width="193.251" height="28" rx="0" ry="0" fill="var(--_group-hdr)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="386.02" y="79.35000000000001" font-size="12" font-weight="600" fill="var(--_text-sec)" dy="4.199999999999999">추론 티어</text>
</g>
<polyline class="edge" data-from="FO" data-to="THOROUGH" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="298.02,119.35 356.02,119.34999999999998 356.02,299.85 390.02,299.8500000000001" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
<polyline class="edge" data-from="DW" data-to="STD" data-style="solid" data-arrow-start="false" data-arrow-end="true" points="298.02,218.05 390.02,218.05000000000007" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#arrowhead)" />
