  <text x="446.563" y="299.85" text-anchor="middle" font-size="13" font-weight="500" fill="var(--_text)"><tspan x="446.563" dy="-3.9000000000000012">THOROUGH</tspan><tspan x="446.563" dy="16.900000000000002">xhigh 추론</tspan></text>
