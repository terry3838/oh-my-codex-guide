<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720.902 780" width="720.902" height="780" style="--bg:#ffffff;--fg:#1f2328;--line:#d1d9e0;--accent:#0969da;--muted:#59636e">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
  text { font-family: 'Inter', system-ui, sans-serif; }
  svg {
    /* Derived from --bg and --fg (overridable via --line, --accent, etc.) */
    --_text:          var(--fg);
    --_text-sec:      var(--muted, color-mix(in srgb, var(--fg) 60%, var(--bg)));
    --_text-muted:    var(--muted, color-mix(in srgb, var(--fg) 40%, var(--bg)));
    --_text-faint:    color-mix(in srgb, var(--fg) 25%, var(--bg));
    --_line:          var(--line, color-mix(in srgb, var(--fg) 50%, var(--bg)));
    --_arrow:         var(--accent, color-mix(in srgb, var(--fg) 85%, var(--bg)));
    --_node-fill:     var(--surface, color-mix(in srgb, var(--fg) 3%, var(--bg)));
    --_node-stroke:   var(--border, color-mix(in srgb, var(--fg) 20%, var(--bg)));
    --_group-fill:    var(--bg);
    --_group-hdr:     color-mix(in srgb, var(--fg) 5%, var(--bg));
    --_inner-stroke:  color-mix(in srgb, var(--fg) 12%, var(--bg));
    --_key-badge:     color-mix(in srgb, var(--fg) 10%, var(--bg));
  }
</style>
<defs>
  <marker id="seq-arrow" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polygon points="0 0, 8 2.5, 0 5" fill="var(--_arrow)" />
  </marker>
  <marker id="seq-arrow-open" markerWidth="8" markerHeight="5" refX="8" refY="2.5" orient="auto-start-reverse">
    <polyline points="0 0, 8 2.5, 0 5" fill="none" stroke="var(--_arrow)" stroke-width="1" />
  </marker>
</defs>
<line class="lifeline" data-actor="U" x1="70" y1="70" x2="70" y2="750" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="L" x1="210" y1="70" x2="210" y2="750" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="W" x1="350" y1="70" x2="350" y2="750" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<line class="lifeline" data-actor="R" x1="490" y1="70" x2="490" y2="750" stroke="var(--_line)" stroke-width="0.75" stroke-dasharray="6 4" />
<g class="message" data-from="U" data-to="L" data-label="omx team ralph 3:executor &quot;task&quot;" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="70" y1="90" x2="210" y2="90" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="140" y="80" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">omx team ralph 3:executor &quot;task&quot;</text>
</g>
<g class="message" data-from="L" data-to="L" data-label="team state 초기화 (linked_ralph=true)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,130 240,130 240,150 210,150" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="140" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">team state 초기화 (linked_ralph=true)</text>
</g>
<g class="message" data-from="L" data-to="L" data-label="ralph state 초기화 (linked_team=true)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,200 240,200 240,220 210,220" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="210" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">ralph state 초기화 (linked_team=true)</text>
</g>
<g class="message" data-from="L" data-to="W" data-label="tmux pane 생성 + inbox 전달" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="270" x2="350" y2="270" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="260" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">tmux pane 생성 + inbox 전달</text>
</g>
<g class="message" data-from="W" data-to="L" data-label="ACK 메시지 (leader-fixed mailbox)" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="350" y1="310" x2="210" y2="310" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="300" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">ACK 메시지 (leader-fixed mailbox)</text>
</g>
<g class="message" data-from="W" data-to="W" data-label="태스크 클레임 → 작업 → 완료" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="350,350 380,350 380,370 350,370" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="388" y="360" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">태스크 클레임 → 작업 → 완료</text>
</g>
<g class="message" data-from="W" data-to="L" data-label="태스크 완료 전환" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="350" y1="420" x2="210" y2="420" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="410" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">태스크 완료 전환</text>
</g>
<g class="message" data-from="L" data-to="W" data-label="shutdown 신호" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="210" y1="460" x2="350" y2="460" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="450" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">shutdown 신호</text>
</g>
<g class="message" data-from="W" data-to="W" data-label="shutdown ACK 작성 후 종료" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="350,500 380,500 380,520 350,520" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="388" y="510" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">shutdown ACK 작성 후 종료</text>
</g>
<g class="message" data-from="L" data-to="L" data-label="팀 state 정리" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="210,570 240,570 240,590 210,590" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="248" y="580" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">팀 state 정리</text>
</g>
<g class="message" data-from="R" data-to="R" data-label="검증 루프 시작 (architect verify)" data-line-style="solid" data-arrow-head="filled" data-self="true">
  <polyline points="490,640 520,640 520,660 490,660" fill="none" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="528" y="650" font-size="11" text-anchor="start" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">검증 루프 시작 (architect verify)</text>
</g>
<g class="message" data-from="R" data-to="U" data-label="최종 완료 또는 수정 요청" data-line-style="solid" data-arrow-head="filled" data-self="false">
  <line x1="490" y1="710" x2="70" y2="710" stroke="var(--_line)" stroke-width="1" marker-end="url(#seq-arrow)" />
  <text x="280" y="700" font-size="11" text-anchor="middle" font-weight="400" fill="var(--_text-muted)" dy="3.8499999999999996">최종 완료 또는 수정 요청</text>
</g>
<g class="actor" data-id="U" data-label="사용자" data-type="participant">
  <rect x="30" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="70" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">사용자</text>
</g>
<g class="actor" data-id="L" data-label="Leader" data-type="participant">
  <rect x="170" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="210" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Leader</text>
</g>
<g class="actor" data-id="W" data-label="Workers" data-type="participant">
  <rect x="306.7195" y="30" width="86.561" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="350" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Workers</text>
</g>
<g class="actor" data-id="R" data-label="Ralph" data-type="participant">
  <rect x="450" y="30" width="80" height="40" rx="4" ry="4" fill="var(--_node-fill)" stroke="var(--_node-stroke)" stroke-width="1" />
  <text x="490" y="50" font-size="13" text-anchor="middle" font-weight="500" fill="var(--_text)" dy="4.55">Ralph</text>
</g>
</svg>